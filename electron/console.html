<!doctype html><html><head><meta charset="UTF-8"><title>FirstSignal Agent</title><style>
body{margin:0;background:#07090c;color:#dde4f0;font:12px Consolas,monospace}*{box-sizing:border-box}header{padding:14px 16px;border-bottom:1px solid #1a2030;background:#0e1117;position:sticky;top:0}.row{display:flex;align-items:center;gap:9px}.dot{width:10px;height:10px;border-radius:50%;background:#00d4a8}h1{font-size:15px;margin:0;color:#00d4a8}.status{margin-left:auto}main{padding:14px}.panel,.card{background:#0e1117;border:1px solid #1a2030;border-radius:7px;padding:10px;margin-bottom:10px}.controls{display:flex;gap:7px;flex-wrap:wrap}input{background:#141920;color:#dde4f0;border:1px solid #263047;border-radius:4px;padding:7px;font:10px Consolas}button{background:#141920;color:#dde4f0;border:1px solid #263047;border-radius:4px;padding:7px 9px;font:10px Consolas;cursor:pointer}.meta{font-size:9px;color:#718096}.title{font-weight:700;margin:5px 0}.summary{line-height:1.45}.green{border-left:3px solid #00d4a8}.yellow{border-left:3px solid #f0c040}.red{border-left:3px solid #ff4060}.proposal-actions{display:flex;gap:6px;margin-top:8px}.activity{max-height:160px;overflow:auto}.activity-line{font-size:9px;line-height:1.5}.section{font-size:10px;color:#718096;margin:12px 0 6px}.folder{font-size:10px;color:#718096;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head><body><header><div class="row"><span id="dot" class="dot"></span><h1>FirstSignal Campaign Agent</h1><span id="status" class="status">STARTING</span></div></header><main>
<div id="folder" class="folder"></div><div class="controls"><button id="openFolder">Open Folder</button><button id="openNotebook">Open Notebook</button><button id="changeFolder">Change Folder</button></div>
<div class="section">SIMULATION CAMPAIGN</div><div class="panel"><div class="controls"><input id="campaignRuns" type="number" min="1" max="100" value="3" style="width:70px"><input id="campaignDates" value="2026-07-06,2026-07-07,2026-07-08,2026-07-09,2026-07-10" style="flex:1"><button id="startCampaign">Run Campaign</button></div><div id="campaignStatus" class="meta" style="margin-top:8px">No campaign running</div></div>
<div class="section">UPGRADES REQUIRING APPROVAL</div><div id="proposals"></div>
<div class="section">OBSERVER ↔ TRADER MEETING</div><div class="panel"><div class="controls"><input id="meetingName" placeholder="meeting name" style="flex:1"><button id="startMeeting">Start Meeting</button><button id="stopMeeting">Stop</button><button id="openMeeting">Open Files</button></div><div id="meetingStatus" class="meta" style="margin-top:8px"></div></div>
<div class="section">LIVE AGENT ACTIVITY</div><div id="activity" class="panel activity"></div><div class="section">RECORDED FINDINGS</div><div id="reports"></div>
</main><script src="console.js"></script></body></html>

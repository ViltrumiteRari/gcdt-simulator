<!doctype html><html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box}body{margin:0;background:#07090c;color:#dce6f2;font:12px Consolas,monospace}main{padding:16px}h2{margin:0;color:#00d4a8;font-size:15px}.tabs{display:flex;gap:6px;margin:14px 0}.tab{border-bottom:2px solid transparent}.tab.active{color:#00d4a8;border-color:#00d4a8}.panel{display:none}.panel.active{display:block}.row{display:flex;gap:8px;align-items:center;margin:8px 0}.grow{flex:1}button,input,select,textarea{font:11px Consolas,monospace;border-radius:5px;border:1px solid #2a3448;background:#111722;color:#dce6f2;padding:8px}button{cursor:pointer}button:disabled{opacity:.4}.primary{background:#00d4a8;color:#06110e;border:0;font-weight:700}.danger{color:#ff8080}.card{border:1px solid #253047;border-radius:8px;padding:10px;margin-top:10px}.muted{color:#8494aa;font-size:10px}.status{color:#00d4a8}.error{color:#ff8080}.selected-days{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.chip,.badge{border:1px solid #2a3448;border-radius:12px;padding:4px 7px}.workers,.review-list{max-height:220px;overflow:auto}.worker{display:grid;grid-template-columns:22px 1fr 90px 56px;gap:5px;padding:5px;border-bottom:1px solid #171e2b}.review-layout{display:grid;grid-template-columns:220px 1fr;gap:10px}.review-item{padding:9px;border-bottom:1px solid #171e2b;cursor:pointer}.review-item.active{background:#111722}.finding{border-left:3px solid #2a3448;padding:8px;margin:7px 0;background:#0c1119}.finding.RED{border-color:#ff6b6b}.finding.YELLOW{border-color:#f4c95d}.finding.GREEN{border-color:#00d4a8}.assessment{white-space:pre-wrap;line-height:1.45;max-height:260px;overflow:auto;background:#0c1119;padding:10px;border-radius:6px}.empty{padding:18px;text-align:center;color:#8494aa}textarea{width:100%;min-height:54px;resize:vertical}</style></head><body><main>
<div class="row"><h2 class="grow">FIRSTSIGNAL CONTROL</h2><span id="message" class="muted"></span></div><div class="tabs"><button class="tab active" data-tab="campaign">CAMPAIGNS</button><button class="tab" data-tab="reviews">REVIEWS & MEETINGS</button></div>
<section id="campaign" class="panel active"><div class="row"><button id="play" class="primary">▶ PLAY</button><button id="pause">Ⅱ PAUSE</button><button id="stop" class="danger">■ STOP</button><label>Speed <input id="speed" type="number" min="0.5" max="10" step="0.5" value="3" style="width:60px"></label><button id="applySpeed">APPLY</button></div>
<div class="card"><div class="muted">NEW CAMPAIGN</div><div class="row"><select id="daySelect" class="grow"></select><button id="addDay">ADD DAY</button></div><div id="selectedDays" class="selected-days"></div><div class="row"><label>Runs/day <input id="runs" type="number" min="1" max="20" value="1" style="width:55px"></label><button id="start" class="primary">START CAMPAIGN</button></div></div>
<div class="card"><div class="row"><span class="grow">CURRENT CAMPAIGN</span><span id="summary" class="status">Loading…</span></div><div id="workers" class="workers"></div><div class="row"><button id="quarantine">QUARANTINE SELECTED</button><button id="delete" class="danger">DELETE SELECTED DATA</button></div></div></section>
<section id="reviews" class="panel"><div class="review-layout"><div class="card"><div class="row"><b class="grow">RUNS</b><button id="refreshReviews">↻</button></div><div id="reviewList" class="review-list"></div></div><div id="reviewDetail" class="card"><div class="empty">Select a completed run.</div></div></div></section>
<script src="campaign-controller.js"></script></main></body></html>
